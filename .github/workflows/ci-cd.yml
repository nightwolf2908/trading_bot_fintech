# ============================================
# CI/CD PIPELINE - Trading Bot (VERSIÓN SIMPLIFICADA)
# ============================================
# 
# ¿QUÉ HACE?
# 1. Pruebas básicas con claves falsas (siempre corre)
# 2. Prueba REAL con GitHub Secrets (solo si configuras secrets)
# 3. Construye y sube la imagen Docker a GHCR
#
# ¿POR QUÉ ESTA VERSIÓN?
# - Aprendes a usar GitHub Secrets sin complicaciones
# - No necesitas servidor para desplegar
# - La imagen queda disponible en GitHub Container Registry
# ============================================

name: CI/CD Pipeline

# ----- EVENTOS -----
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Permite ejecutar manualmente

# ----- VARIABLES -----
env:
  IMAGE_NAME: trading-bot
  REGISTRY: ghcr.io

# ----- JOBS -----
jobs:

  # ============================================
  # JOB 1: PRUEBAS BÁSICAS (claves falsas)
  # ============================================
  test:
    name: 🧪 Pruebas básicas
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4
      
      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 🔥 Claves FALSAS - solo para verificar sintaxis
      - name: 🔐 Crear .env de prueba
        run: |
          echo "BINANCE_API_KEY=test_key" > .env
          echo "BINANCE_SECRET_KEY=test_secret" >> .env
          echo "BINANCE_TESTNET=True" >> .env
          echo "LOG_LEVEL=INFO" >> .env
      
      - name: 🔍 Verificar sintaxis
        run: |
          python -m py_compile src/**/*.py
          python -m py_compile main.py
          python -m py_compile test_strategy.py
          python -m py_compile test_connection.py
      
      - name: 🧪 Ejecutar prueba de estrategia
        run: |
          python -c "
          from src.strategies.simple_moving_average import SimpleMovingAverageStrategy
          strategy = SimpleMovingAverageStrategy(short_window=5, long_window=10)
          for i in range(20, 40):
              strategy.add_price(i)
          assert len(strategy.prices) == 20
          print('✅ Estrategia funciona correctamente')
          "
      
      - name: ✅ Pruebas básicas completadas
        run: echo "✅ Todas las pruebas básicas pasaron"

  # ============================================
  # JOB 2: PRUEBA REAL CON GITHUB SECRETS
  # ============================================
  # Este job SOLO corre si configuraste los secrets
  # Te enseña a usar secrets en GitHub Actions
  test-real:
    name: 🔬 Prueba con Binance (usa Secrets)
    runs-on: ubuntu-latest
    needs: test  # Espera a que las pruebas básicas pasen
    
    # 🔥 CONDICIÓN: Solo corre si existen los secrets
    # Si no los configuras, este job se SKIP (salta)
    if: secrets.BINANCE_API_KEY != '' && secrets.BINANCE_SECRET_KEY != ''
    
    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4
      
      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt
      
      # 🔥 CLAVES REALES DESDE GITHUB SECRETS
      # Estas son las claves de tu Binance Testnet
      - name: 🔐 Crear .env con Secrets
        run: |
          echo "BINANCE_API_KEY=${{ secrets.BINANCE_API_KEY }}" > .env
          echo "BINANCE_SECRET_KEY=${{ secrets.BINANCE_SECRET_KEY }}" >> .env
          echo "BINANCE_TESTNET=True" >> .env
          echo "LOG_LEVEL=INFO" >> .env
      
      # 🔥 PRUEBA REAL: Conecta a Binance Testnet
      - name: 🔬 Probar conexión a Binance Testnet
        run: |
          echo "🔬 Probando conexión a Binance Testnet..."
          python test_connection.py
      
      - name: 📊 Mostrar balance de prueba
        run: |
          echo "📊 Balance de prueba:"
          python -c "
          from src.core.exchange_client import ExchangeClient
          client = ExchangeClient()
          if client.check_connection():
              usdt = client.get_balance('USDT')
              btc = client.get_balance('BTC')
              print(f'   💵 USDT: ${usdt:,.2f}')
              print(f'   ₿ BTC: {btc:.8f}')
          "
      
      - name: ✅ Prueba real completada
        run: echo "✅ ¡Conexión exitosa! Los secrets funcionan correctamente"

  # ============================================
  # JOB 3: CONSTRUIR Y SUBIR DOCKER
  # ============================================
  build-and-push:
    name: 🐳 Construir y Subir Docker
    runs-on: ubuntu-latest
    needs: test  # Solo corre si las pruebas básicas pasaron
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4
      
      # 🔐 Login a GHCR (GitHub Container Registry)
      # GITHUB_TOKEN es automático, no necesitas secrets extra
      - name: 🔐 Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # 🏷️ Generar tags para la imagen
      - name: 🏷️ Generar tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest
      
      # 🐳 Construir imagen SIN claves
      - name: 🐳 Construir y subir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: 📢 Imagen publicada
        run: |
          echo "✅ Imagen publicada en:"
          echo "   📦 ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "📥 Para descargarla:"
          echo "   docker pull ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "🚀 Para ejecutarla:"
          echo "   docker run --env-file .env ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest"