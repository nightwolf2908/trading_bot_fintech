# ============================================
# CI/CD PIPELINE - Trading Bot
# ============================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  IMAGE_NAME: trading-bot
  REGISTRY: ghcr.io

jobs:

  # ============================================
  # JOB 1: PRUEBAS BÁSICAS
  # ============================================
  test:
    name: 🧪 Pruebas básicas
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4
      
      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🔐 Crear .env de prueba
        run: |
          echo "BINANCE_API_KEY=test_key" > .env
          echo "BINANCE_SECRET_KEY=test_secret" >> .env
          echo "BINANCE_TESTNET=True" >> .env
          echo "LOG_LEVEL=INFO" >> .env
      
      - name: 🔍 Verificar sintaxis
        run: |
          python -m py_compile src/**/*.py
          python -m py_compile main.py
          python -m py_compile test_strategy.py
          python -m py_compile test_connection.py
      
      - name: 🧪 Ejecutar prueba de estrategia
        run: |
          python -c "
          from src.strategies.simple_moving_average import SimpleMovingAverageStrategy
          strategy = SimpleMovingAverageStrategy(short_window=5, long_window=10)
          for i in range(1, 21):
              strategy.add_price(i)
          assert len(strategy.prices) == 10
          print('✅ Estrategia funciona correctamente')
          print(f'📊 Precios guardados: {len(strategy.prices)}')
          print(f'📊 SMA(5): {strategy.calculate_sma(5)}')
          print(f'📊 SMA(10): {strategy.calculate_sma(10)}')
          "

  # ============================================
  # JOB 2: PRUEBA REAL CON SECRETS
  # ============================================
  test-real:
    name: 🔬 Prueba con Binance (usa Secrets)
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4
      
      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt
      
      - name: 🔐 Verificar Secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.BINANCE_API_KEY }}" ] || [ -z "${{ secrets.BINANCE_SECRET_KEY }}" ]; then
            echo "⚠️ Secrets no configurados. Saltando prueba real..."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Secrets configurados correctamente"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      
      - name: 🔐 Crear .env con Secrets
        if: steps.check-secrets.outputs.skip == 'false'
        run: |
          echo "BINANCE_API_KEY=${{ secrets.BINANCE_API_KEY }}" > .env
          echo "BINANCE_SECRET_KEY=${{ secrets.BINANCE_SECRET_KEY }}" >> .env
          echo "BINANCE_TESTNET=True" >> .env
          echo "LOG_LEVEL=INFO" >> .env
      
      - name: 🔬 Probar conexión a Binance Testnet
        if: steps.check-secrets.outputs.skip == 'false'
        run: |
          echo "🔬 Probando conexión a Binance Testnet..."
          python test_connection.py
      
      - name: 📊 Mostrar balance de prueba
        if: steps.check-secrets.outputs.skip == 'false'
        run: |
          echo "📊 Balance de prueba:"
          python -c "
          from src.core.exchange_client import ExchangeClient
          client = ExchangeClient()
          if client.check_connection():
              usdt = client.get_balance('USDT')
              btc = client.get_balance('BTC')
              print(f'   💵 USDT: ${usdt:,.2f}')
              print(f'   ₿ BTC: {btc:.8f}')
          "
      
      - name: ⏭️ Secrets no configurados
        if: steps.check-secrets.outputs.skip == 'true'
        run: |
          echo "⏭️ Saltando pruebas reales porque no hay secrets configurados"
          echo ""
          echo "📝 Para configurar secrets:"
          echo "   1. Ve a Settings → Secrets and variables → Actions"
          echo "   2. Agrega BINANCE_API_KEY y BINANCE_SECRET_KEY"

  # ============================================
  # JOB 3: CONSTRUIR Y SUBIR DOCKER
  # ============================================
  build-and-push:
    name: 🐳 Construir y Subir Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4
      
      - name: 🔐 Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🏷️ Generar tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.actor }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest
      
      # 🔥 CORREGIDO: Sin caché
      - name: 🐳 Construir y subir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      
      - name: 📢 Imagen publicada
        run: |
          echo "✅ Imagen publicada en:"
          echo "   📦 ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "📥 Para descargarla:"
          echo "   docker pull ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "🚀 Para ejecutarla:"
          echo "   docker run --env-file .env ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest"